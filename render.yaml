services:
  - type: web
    name: ai-interview-platform # Or your service name
    env: node
    plan: free # Or your plan
    buildCommand: |
      # Install dependencies for Puppeteer
      apt-get update && apt-get install -yq libgconf-2-4 libatk1.0-0 libatk-bridge2.0-0 libgdk-pixbuf2.0-0 libgtk-3-0 libgbm-dev libnss3 libxss1 libasound2 libxtst6 xauth xvfb
      # Install your node modules
      npm install
    startCommand: node your-main-server-file.js # Change this to your actual start command
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable